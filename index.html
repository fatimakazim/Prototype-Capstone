<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saidpur Village VR - Map Room & Teleport</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    #ui-overlay {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      background: rgba(0, 0, 0, 0.7); color: white; padding: 15px 20px;
      border-radius: 10px; font-size: 14px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }
    #ui-overlay h3 { margin: 0 0 10px 0; font-size: 18px; color: #ffd700; }
    
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0a0a14 0%, #16213e 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 2000; transition: opacity 0.5s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    
    .loader {
      width: 50px; height: 50px; border: 5px solid rgba(255, 215, 0, 0.3);
      border-top: 5px solid #ffd700; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <div class="loading-text" style="color: white; margin-top: 20px; font-size: 16px;">Loading Saidpur VR...</div>
  </div>

  <div id="ui-overlay">
    <h3>🏛️ Saidpur Village VR</h3>
    <p><strong>Controls:</strong></p>
    <p>🖱️ Point and Click/Trigger Map Hotspots to Teleport</p>
    <p>🕹️ Left Thumbstick to Walk (VR Mode)</p>
  </div>

  <!-- ============================================================
       THUMBSTICK LOCOMOTION COMPONENT
       Registered before <a-scene> so it's available at parse time.
  ============================================================ -->
  <script>
    AFRAME.registerComponent('thumbstick-locomotion', {
      schema: {
        speed:    { type: 'number',  default: 2.5  },  // units per second
        deadzone: { type: 'number',  default: 0.2  },  // ignore small drift
        vrOnly:   { type: 'boolean', default: true }   // only active in VR headset
      },

      init: function () {
        this.axisX    = 0;
        this.axisY    = 0;
        this.isVRMode = false;

        // Track VR entry / exit
        this.el.sceneEl.addEventListener('enter-vr', () => {
          this.isVRMode = true;
        });
        this.el.sceneEl.addEventListener('exit-vr', () => {
          this.isVRMode = false;
          // Zero out axes so there's no phantom movement on re-entry
          this.axisX = 0;
          this.axisY = 0;
        });

        // Bind handler and attach to left controller once it exists.
        // Controllers are attached asynchronously, so we poll briefly.
        this.onThumbstickMoved = this.onThumbstickMoved.bind(this);
        this._bindController();
      },

      // Polls until #left-hand exists, then attaches the thumbstickmoved listener.
      _bindController: function () {
        const leftHand = document.querySelector('#left-hand');
        if (!leftHand) {
          setTimeout(() => this._bindController(), 200);
          return;
        }
        leftHand.addEventListener('thumbstickmoved', this.onThumbstickMoved);
      },

      // Called every time the left thumbstick moves.
      onThumbstickMoved: function (evt) {
        const x = evt.detail.x;  // left / right
        const y = evt.detail.y;  // forward (negative) / backward (positive)

        // Apply deadzone — eliminates hardware drift
        this.axisX = Math.abs(x) > this.data.deadzone ? x : 0;
        this.axisY = Math.abs(y) > this.data.deadzone ? y : 0;
      },

      tick: function (time, delta) {
        // Gate: only run in VR unless vrOnly is disabled
        if (this.data.vrOnly && !this.isVRMode) return;
        if (this.axisX === 0 && this.axisY === 0) return;

        const dt     = delta / 1000;   // milliseconds → seconds
        const rig    = this.el;        // this component lives on #camera-rig
        const camera = document.querySelector('#main-camera');

        // Combine rig Y-rotation with camera look Y-rotation so movement
        // is always relative to the direction the player is facing.
        const camRotY   = camera.object3D.rotation.y;
        const rigRotY   = rig.object3D.rotation.y;
        const totalRotY = camRotY + rigRotY;

        // Project thumbstick axes onto the horizontal plane.
        // axisY > 0 = stick pulled back = move backward, so we negate it.
        const moveX = Math.sin(totalRotY) * (-this.axisY) + Math.cos(totalRotY) * (this.axisX);
        const moveZ = Math.cos(totalRotY) * (-this.axisY) - Math.sin(totalRotY) * (this.axisX);

        // Directly update the rig position (never the camera entity itself)
        const pos = rig.object3D.position;
        pos.x += moveX * this.data.speed * dt;
        pos.z += moveZ * this.data.speed * dt;
      },

      // Clean up listener when component is removed
      remove: function () {
        const leftHand = document.querySelector('#left-hand');
        if (leftHand) {
          leftHand.removeEventListener('thumbstickmoved', this.onThumbstickMoved);
        }
      }
    });
  </script>

  <a-scene 
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; highRefreshRate: true;"
    shadow="type: pcfsoft; enabled: true"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true">
    
    <a-assets timeout="10000">
      <a-asset-item id="village-model" src="model.glb"></a-asset-item>
      
      <img id="sky-tex"    src="https://cdn.polyhaven.com/asset_img/primary/sunset_in_the_chalk_quarry.png" crossorigin="anonymous">
      <img id="cobble-tex" src="https://cdn.polyhaven.com/asset_img/primary/cobblestone_floor_02.png?height=780" crossorigin="anonymous">
      <img id="stone-tex"  src="https://cdn.polyhaven.com/asset_img/primary/rock_wall.png?height=780" crossorigin="anonymous">
      <img id="water-tex"  src="https://cdn.polyhaven.com/asset_img/primary/water_002.png?height=780" crossorigin="anonymous">
    </a-assets>

    <!-- MAP WORLD -->
    <a-entity id="map-world" visible="true">
      <a-sky 
        id="map-sky"
        color="#0a0a14"
        material="shader: flat; fog: false;">
      </a-sky>
      <a-light type="ambient" color="#1a1a24" intensity="1.2"></a-light>
      <a-light type="point" color="#ffb74d" intensity="2.5" distance="8" position="0 2.5 0" castShadow="true"></a-light>

      <a-entity position="0 0 0">
        <a-box position="0 0.4 0" width="1.2" height="0.8" depth="0.8" material="src: #stone-tex; color: #333; roughness: 0.9"></a-box>
        <a-box position="0 0.85 0" width="1.8" height="0.1" depth="1.2" material="src: #stone-tex; color: #555; roughness: 1"></a-box>
        <a-plane position="0 0.91 0" rotation="-90 0 0" width="1.7" height="1.1" material="src: #cobble-tex; color: #a69b82; roughness: 0.8"></a-plane>
      </a-entity>

      <a-entity id="map-hotspots" position="0 0.95 0">
        
        <a-sphere class="clickable map-hotspot" position="-0.5 0 0.2" radius="0.05"
                  material="color: #ffaa00; emissive: #ff8800; emissiveIntensity: 1; transparent: true; opacity: 0.8"
                  animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true; easing: easeInOutSine"
                  data-target-position="28 0 95" data-target-rotation="0 45 0">
        </a-sphere>

        <a-sphere class="clickable map-hotspot" position="0.3 0 -0.1" radius="0.05"
                  material="color: #00ffaa; emissive: #00aa66; emissiveIntensity: 1; transparent: true; opacity: 0.8"
                  animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 900; loop: true; easing: easeInOutSine"
                  data-target-position="0 0 0" data-target-rotation="0 -90 0">
        </a-sphere>

        <a-sphere class="clickable map-hotspot" position="0.5 0 0.3" radius="0.05"
                  material="color: #00aaff; emissive: #0066aa; emissiveIntensity: 1; transparent: true; opacity: 0.8"
                  animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 850; loop: true; easing: easeInOutSine"
                  data-target-position="8 0 -10" data-target-rotation="0 180 0">
        </a-sphere>

      </a-entity>
    </a-entity>

    <!-- VILLAGE WORLD -->
    <a-entity id="village-world" visible="false">
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" color="#ffd7a8" intensity="1.5" position="-20 30 10" castShadow="true"></a-light>

      <a-entity
        id="village-glb"
        gltf-model="#village-model"
        position="0 -1.7 0"
        scale="1 1 1"
        rotation="0 0 0"
        shadow="cast: true; receive: true"
        animation-mixer="clip: *; loop: repeat">
      </a-entity>

      <a-sky src="#sky-tex" rotation="0 -110 0" material="fog: false;"></a-sky> 
      
      <a-plane rotation="-90 0 0" width="4" height="50" position="0 0.03 -10" material="src: #cobble-tex; repeat: 4 30; color: #dcb;"></a-plane>

      <a-entity position="8 0 0">
        <a-plane rotation="-90 0 0" width="6" height="60" position="0 0.02 -10" 
                 material="src: #water-tex; repeat: 2 18; transparent: true; opacity: 0.8; metalness: 0.9; roughness: 0.1; color: #ffbf00;" 
                 animation="property: material.offset.y; from: 0; to: 1; dur: 10000; loop: true; easing: linear;">
        </a-plane>
        <a-box position="-3.2 0.05 -10" width="0.6" height="0.4" depth="60" material="src: #stone-tex; repeat: 1 10; color: #864;"></a-box>
        <a-box position="3.2 0.05 -10" width="0.6" height="0.4" depth="60" material="src: #stone-tex; repeat: 1 10; color: #864;"></a-box>
      </a-entity>
    </a-entity>

    <!-- DUST BURST TRANSITION EFFECT -->
    <a-entity id="dust-burst" visible="false" position="0 0 0">
      <a-sphere radius="0.5" material="color: #d2b48c; shader: flat; transparent: true; opacity: 0.9; side: back" 
                animation__scale="property: scale; from: 1 1 1; to: 40 40 40; dur: 1500; startEvents: burst; easing: easeOutCubic" 
                animation__fade="property: material.opacity; from: 0.9; to: 0; dur: 1500; startEvents: burst; easing: easeOutQuad">
      </a-sphere>
      <a-sphere radius="0.3" material="color: #f5deb3; shader: flat; transparent: true; opacity: 0.7; side: back" 
                animation__scale="property: scale; from: 1 1 1; to: 30 30 30; dur: 1200; startEvents: burst; easing: easeOutCubic" 
                animation__fade="property: material.opacity; from: 0.7; to: 0; dur: 1200; startEvents: burst; easing: easeOutQuad">
      </a-sphere>
    </a-entity>

    <!--
      CAMERA RIG
      thumbstick-locomotion component added here.
      speed: 2.5 units/sec  |  deadzone: 0.2  |  vrOnly: true
      All other attributes are unchanged from the original.
    -->
    <a-entity id="camera-rig" position="0 0 2" rotation="0 0 0"
              thumbstick-locomotion="speed: 2.5; deadzone: 0.2; vrOnly: true">

      <a-entity id="main-camera" camera look-controls wasd-controls position="0 1.6 0">
        
        <a-plane id="fade-plane" 
                 position="0 0 -0.1" 
                 width="2" height="2" 
                 material="color: #000; shader: flat; transparent: true; opacity: 0; depthTest: false">
        </a-plane>

      </a-entity>
      
      <a-entity id="left-hand" 
                laser-controls="hand: left" 
                raycaster="objects: .clickable; far: 20; lineColor: #FF0000; showLine: true">
      </a-entity>
      
      <a-entity id="right-hand" 
                laser-controls="hand: right" 
                raycaster="objects: .clickable; far: 20; lineColor: #FF0000; showLine: true">
      </a-entity>

    </a-entity>

  </a-scene>

  <script src="main.js"></script>
</body>
</html>
