<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflection — Saidpur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="../components/thumbstick-locomotion.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    /* Exit overlay — fades in after 60s of reflection */
    #exit-overlay {
      position: fixed; inset: 0; z-index: 800;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(4,4,10,0);
      pointer-events: none;
      transition: background 2s ease;
    }
    #exit-overlay.visible {
      background: rgba(4,4,10,0.75);
      pointer-events: all;
    }
    #exit-overlay p {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      color: #e8dcc8;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #exit-overlay.visible p { opacity: 1; }
    #exit-overlay a {
      margin-top: 2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #c0392b;
      text-decoration: none;
      border-bottom: 1px solid #c0392b;
      padding-bottom: 2px;
      opacity: 0;
      transition: opacity 2s ease 0.5s;
    }
    #exit-overlay.visible a { opacity: 1; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Entering Reflection Space…</div>
  </div>

  <!-- Exit prompt appears after 60s -->
  <div id="exit-overlay">
    <p>Thank you for bearing witness.<br>
       <em>Memory is an act of resistance.</em></p>
    <a href="../index.html">Return to beginning</a>
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    shadow="type: pcfsoft; enabled: true"
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true"
    background="color: #04040a">

    <!-- ── Lighting — single warm point above, darkness all around ── -->
    <a-light type="ambient"  color="#080810" intensity="1.5"></a-light>
    <a-light type="point"    color="#d4a843" intensity="2.2" distance="10" position="0 5 0" castShadow="true"></a-light>

    <!-- ── Sky — deep void ── -->
    <a-sky color="#04040a" material="shader: flat; fog: false"></a-sky>

    <!-- ── Stone platform above the clouds ── -->
    <a-cylinder position="0 0 0" radius="4" height="0.2"
                material="color: #2c2418; roughness: 0.95; metalness: 0.05" shadow="cast: true; receive: true">
    </a-cylinder>
    <!-- Outer ring -->
    <a-torus position="0 0.11 0" radius="4" radius-tubular="0.06"
             material="color: #d4a843; emissive: #d4a843; emissiveIntensity: 0.4">
    </a-torus>

    <!-- ── Cloud plane below platform ── -->
    <a-plane rotation="-90 0 0" width="200" height="200" position="0 -3 0"
             material="color: #1a1822; opacity: 0.7; transparent: true">
    </a-plane>

    <!-- ── Survivor Quote — rotates slowly ── -->
    <a-entity position="0 2.2 0"
              animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 120000; loop: true; easing: linear">

      <!-- Quote face 1 -->
      <a-entity position="0 0 -1.8">
        <a-plane width="3.0" height="1.4"
                 material="color: #04040a; opacity: 0; transparent: true">
        </a-plane>
        <!-- REPLACE with real survivor quote -->
        <a-text value="&quot;We took only what we could carry.&#10;The rest we left in the dust.&quot;"
                position="0 0.2 0.01" color="#e8dcc8" width="2.8" align="center" font="mozillavr">
        </a-text>
        <a-text value="— Placeholder Testimony&#10;   Replace with real survivor quote"
                position="0 -0.4 0.01" color="#5a5040" width="2.6" align="center" font="mozillavr">
        </a-text>
      </a-entity>

      <!-- Quote face 2 (opposite side) -->
      <a-entity position="0 0 1.8" rotation="0 180 0">
        <a-plane width="3.0" height="1.4"
                 material="color: #04040a; opacity: 0; transparent: true">
        </a-plane>
        <!-- REPLACE with second real survivor quote -->
        <a-text value="&quot;Saidpur was our home for&#10;400 years. In one night,&#10;it became someone else's.&quot;"
                position="0 0.2 0.01" color="#e8dcc8" width="2.8" align="center" font="mozillavr">
        </a-text>
        <a-text value="— Placeholder Testimony&#10;   Replace with real survivor quote"
                position="0 -0.4 0.01" color="#5a5040" width="2.6" align="center" font="mozillavr">
        </a-text>
      </a-entity>
    </a-entity>

    <!-- ── Central flame / eternal light ── -->
    <a-sphere position="0 0.8 0" radius="0.12"
              material="color: #d4a843; emissive: #d4a843; emissiveIntensity: 4; transparent: true; opacity: 0.9"
              animation="property: scale; from: 1 1 1; to: 1.15 1.2 1.15; dir: alternate; dur: 1400; loop: true; easing: easeInOutSine">
    </a-sphere>
    <!-- Flame glow ring -->
    <a-ring position="0 0.8 0" rotation="-90 0 0"
            radius-inner="0.15" radius-outer="0.4"
            material="color: #d4a843; emissive: #d4a843; emissiveIntensity: 0.6; transparent: true; opacity: 0.3"
            animation="property: material.opacity; from: 0.3; to: 0.05; dir: alternate; dur: 1600; loop: true">
    </a-ring>

    <!-- ── Distant particle stars / souls ── -->
    <a-entity id="reflection-particles" position="0 0 0">
      <!-- Generated procedurally in JS below -->
    </a-entity>

    <!-- ── Camera Rig ── -->
    <a-entity id="camera-rig" position="0 0.15 2.5"
              thumbstick-locomotion="speed: 1.5; deadzone: 0.2; vrOnly: true">
      <a-entity id="main-camera" camera look-controls position="0 1.6 0">
        <a-plane id="fade-plane" position="0 0 -0.1" width="2" height="2"
                 material="color: #000; shader: flat; transparent: true; opacity: 1; depthTest: false">
        </a-plane>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const scene     = document.querySelector('a-scene');
    const fadePlane = document.querySelector('#fade-plane');

    scene.addEventListener('loaded', () => {
      // Apply void fog
      scene.setAttribute('fog', 'type: exponential; color: #04040a; density: 0.05');

      // Fade in from black
      setTimeout(() => {
        document.querySelector('#loading-screen').classList.add('hidden');
        fadePlane.setAttribute('animation__fadeout',
          'property: material.opacity; from: 1; to: 0; dur: 2500; easing: linear');
      }, 800);

      // Generate star particles
      buildStars();

      // Show exit overlay after 60s
      setTimeout(() => {
        document.getElementById('exit-overlay').classList.add('visible');
      }, 60000);
    });

    // ── Generate 300 small drifting stars ──────────────
    function buildStars() {
      const container = document.getElementById('reflection-particles');
      for (let i = 0; i < 300; i++) {
        const star = document.createElement('a-sphere');
        const r = 8 + Math.random() * 18;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.random() * Math.PI;
        star.setAttribute('position', {
          x: r * Math.sin(phi) * Math.cos(theta),
          y: -2 + Math.random() * 12,
          z: r * Math.sin(phi) * Math.sin(theta)
        });
        star.setAttribute('radius', 0.02 + Math.random() * 0.04);
        star.setAttribute('material', {
          color: '#d4a843',
          emissive: '#d4a843',
          emissiveIntensity: 0.6 + Math.random() * 0.8,
          transparent: true,
          opacity: 0.3 + Math.random() * 0.5
        });
        // Gentle twinkle
        const dur = 1800 + Math.floor(Math.random() * 3000);
        star.setAttribute('animation',
          `property: material.opacity; from: ${(0.2 + Math.random() * 0.4).toFixed(2)}; to: ${(0.7 + Math.random() * 0.3).toFixed(2)}; dir: alternate; dur: ${dur}; loop: true; easing: easeInOutSine`);
        container.appendChild(star);
      }
    }
  </script>
</body>
</html>
