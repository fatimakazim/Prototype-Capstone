<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Table — Saidpur VR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <!-- Load all custom components before the scene -->
  <script src="../components/thumbstick-locomotion.js"></script>
  <script src="../components/snap-turn.js"></script>
  <script src="../components/narrative-hotspot.js"></script>
  <script src="../components/proximity-trigger.js"></script>
  <script src="../components/fade-transition.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

  <!-- ── Loading screen ── -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Map Room…</div>
  </div>

  <!-- ── HUD ── -->
  <div class="hud">
    <div class="hud-title">🗺 Saidpur — Map Room</div>
    <div>🖱 Point + Click hotspot to teleport</div>
    <div>🕹 Left stick: walk &nbsp;|&nbsp; Right stick: turn</div>
    <div>⟵ <a href="../scenes/briefing-scene.html"
              style="color:#c0392b; text-decoration:none;">Back to Briefing</a></div>
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    shadow="type: pcfsoft; enabled: true"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true">

    <!-- ═══════════════ ASSETS ═══════════════ -->
    <a-assets timeout="20000">
      <!-- REPLACE placeholder textures with real materials -->
      <img id="stone-tex"   src="https://cdn.jsdelivr.net/gh/nicktindall/cyclon.js@HEAD/test/img/test_image.png" crossorigin="anonymous" />
      <img id="cobble-tex"  src="https://cdn.jsdelivr.net/gh/nicktindall/cyclon.js@HEAD/test/img/test_image.png" crossorigin="anonymous" />
    </a-assets>

    <!-- ── Ambient environment lighting ── -->
    <a-light type="ambient"     color="#1a1a24" intensity="1.2"></a-light>
    <a-light type="point"       color="#ffb74d" intensity="2.5" distance="8" position="0 3 0" castShadow="true"></a-light>
    <a-light type="directional" color="#4060a0" intensity="0.4" position="-5 8 5"></a-light>

    <!-- ── Sky ── -->
    <a-sky color="#06060f" material="shader: flat; fog: false"></a-sky>

    <!-- ── Fog ── -->
    <!-- Applied via JS on scene load -->

    <!-- ═══════════════════════════════════════
         MAP TABLE GEOMETRY
    ═══════════════════════════════════════ -->
    <a-entity id="map-table" position="0 0 0">
      <!-- Pedestal -->
      <a-box position="0 0.4 0" width="1.2" height="0.8" depth="0.8"
             material="color: #2a2418; roughness: 0.9; metalness: 0.1">
      </a-box>
      <!-- Table top -->
      <a-box position="0 0.85 0" width="1.9" height="0.1" depth="1.3"
             material="color: #3c3020; roughness: 0.8">
      </a-box>
      <!-- Map surface — glowing top -->
      <a-plane position="0 0.91 0" rotation="-90 0 0" width="1.75" height="1.15"
               material="color: #0a1428; emissive: #0a1428; emissiveIntensity: 0.3; roughness: 0.6">
      </a-plane>
      <!-- Saidpur label on map -->
      <a-text value="SAIDPUR VILLAGE"
              position="0 0.95 0.1" rotation="-90 0 0"
              color="#d4a843" width="1.5" align="center" font="mozillavr">
      </a-text>
    </a-entity>

    <!-- ═══════════════════════════════════════
         HOTSPOTS  — click to teleport to village
         Add data-target-position and data-target-rotation
         to define where the camera rig lands.
    ═══════════════════════════════════════ -->
    <a-entity id="map-hotspots" position="0 0.95 0">

      <!-- Hotspot 01: Village Entrance -->
      <a-sphere class="clickable map-hotspot"
                position="-0.45 0.05 0.15"
                radius="0.055"
                material="color: #ffaa00; emissive: #ff8800; emissiveIntensity: 1.2; transparent: true; opacity: 0.85"
                animation="property: scale; from: 1 1 1; to: 1.35 1.35 1.35; dir: alternate; dur: 800; loop: true; easing: easeInOutSine"
                data-target-position="0 0 0"
                data-target-rotation="0 0 0"
                data-label="Village Entrance"
                data-description="Main gateway into Saidpur. Hindu pilgrims once entered here.">
      </a-sphere>
      <a-text value="Entrance" position="-0.45 0.17 0.15" rotation="-90 0 0"
              color="#ffaa00" width="0.6" align="center" font="mozillavr">
      </a-text>

      <!-- Hotspot 02: Ram Kund Temple Site -->
      <a-sphere class="clickable map-hotspot"
                position="0.25 0.05 -0.12"
                radius="0.055"
                material="color: #00ffaa; emissive: #00bb77; emissiveIntensity: 1.2; transparent: true; opacity: 0.85"
                animation="property: scale; from: 1 1 1; to: 1.35 1.35 1.35; dir: alternate; dur: 920; loop: true; easing: easeInOutSine"
                data-target-position="8 0 -10"
                data-target-rotation="0 180 0"
                data-label="Ram Kund"
                data-description="Ancient Hindu pilgrimage tank. Abandoned after Partition.">
      </a-sphere>
      <a-text value="Ram Kund" position="0.25 0.17 -0.12" rotation="-90 0 0"
              color="#00ffaa" width="0.7" align="center" font="mozillavr">
      </a-text>

      <!-- Hotspot 03: Upper Village / Haveli -->
      <a-sphere class="clickable map-hotspot"
                position="0.48 0.05 0.28"
                radius="0.055"
                material="color: #4488ff; emissive: #2255cc; emissiveIntensity: 1.2; transparent: true; opacity: 0.85"
                animation="property: scale; from: 1 1 1; to: 1.35 1.35 1.35; dir: alternate; dur: 860; loop: true; easing: easeInOutSine"
                data-target-position="28 0 95"
                data-target-rotation="0 45 0"
                data-label="The Haveli"
                data-description="Former Hindu merchant's mansion. Now a heritage restaurant.">
      </a-sphere>
      <a-text value="Haveli" position="0.48 0.17 0.28" rotation="-90 0 0"
              color="#4488ff" width="0.6" align="center" font="mozillavr">
      </a-text>

    </a-entity>

    <!-- ── Info panel next to table (shown on hotspot hover) ── -->
    <a-entity id="info-panel" position="2.2 1.4 -0.5" rotation="0 -25 0" visible="true">
      <a-plane width="2.0" height="1.4"
               material="color: #080812; opacity: 0.9; transparent: true">
      </a-plane>
      <a-box position="0 0.65 0.01" width="2.0" height="0.055" depth="0.01"
             material="color: #d4a843; emissive: #d4a843; emissiveIntensity: 0.6">
      </a-box>
      <a-text id="info-label" value="Select a location"
              position="-0.88 0.42 0.02" color="#d4a843" width="1.9" font="mozillavr" align="left">
      </a-text>
      <a-text id="info-desc" value="Point at a glowing marker&#10;on the map to learn more.&#10;&#10;Click to teleport there."
              position="-0.88 0.1 0.02" color="#9a8e7a" width="1.8" font="mozillavr" align="left">
      </a-text>
    </a-entity>

    <!-- ── Narrative audio intro panel ── -->
    <a-entity position="-2.4 1.4 -0.5" rotation="0 25 0">
      <a-plane width="1.8" height="1.0"
               material="color: #080812; opacity: 0.9; transparent: true">
      </a-plane>
      <a-box position="0 0.45 0.01" width="1.8" height="0.055" depth="0.01"
             material="color: #c0392b; emissive: #c0392b; emissiveIntensity: 0.6">
      </a-box>
      <a-text value="NARRATOR"
              position="-0.8 0.28 0.02" color="#c0392b" width="1.6" font="mozillavr" align="left">
      </a-text>
      <a-text value="&quot;Three locations. Each holds&#10;a story the village&#10;cannot forget.&quot;"
              position="-0.8 -0.05 0.02" color="#b8a882" width="1.6" font="mozillavr" align="left">
      </a-text>
    </a-entity>

    <!-- ── Dust burst effect on teleport ── -->
    <a-entity id="dust-burst" visible="false" position="0 0 0">
      <a-sphere radius="0.5"
                material="color: #d2b48c; shader: flat; transparent: true; opacity: 0.9; side: back"
                animation__scale="property: scale; from: 1 1 1; to: 40 40 40; dur: 1500; startEvents: burst; easing: easeOutCubic"
                animation__fade="property: material.opacity; from: 0.9; to: 0; dur: 1500; startEvents: burst; easing: easeOutQuad">
      </a-sphere>
    </a-entity>

    <!-- ── Camera Rig ── -->
    <a-entity id="camera-rig" position="0 0 2.8" rotation="0 0 0"
              thumbstick-locomotion="speed: 2.5; deadzone: 0.2; vrOnly: true"
              snap-turn="angle: 45">

      <a-entity id="main-camera" camera look-controls wasd-controls position="0 1.6 0">
        <a-plane id="fade-plane" position="0 0 -0.1" width="2" height="2"
                 material="color: #000; shader: flat; transparent: true; opacity: 0; depthTest: false">
        </a-plane>
      </a-entity>

      <a-entity id="left-hand"
                laser-controls="hand: left"
                raycaster="objects: .clickable; far: 20; lineColor: #ffaa00; showLine: true">
      </a-entity>
      <a-entity id="right-hand"
                laser-controls="hand: right"
                raycaster="objects: .clickable; far: 20; lineColor: #ffaa00; showLine: true">
      </a-entity>
    </a-entity>

  </a-scene>

  <script src="../components/main-map-table.js"></script>
  <script>
    // Apply fog and hide loading screen once scene loads
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      scene.setAttribute('fog', 'type: exponential; color: #06060f; density: 0.08');
      setTimeout(() => {
        document.querySelector('#loading-screen').classList.add('hidden');
      }, 1200);
    });
  </script>

</body>
</html>
