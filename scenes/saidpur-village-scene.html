<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saidpur Village — VR Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <script src="../components/thumbstick-locomotion.js"></script>
  <script src="../components/snap-turn.js"></script>
  <script src="../components/narrative-hotspot.js"></script>
  <script src="../components/proximity-trigger.js"></script>
  <script src="../components/historical-overlay.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* Grip-toggle hint */
    #grip-hint {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 600;
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      color: #5a5040; letter-spacing: 0.12em; line-height: 1.9;
      text-align: right; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Saidpur Village…</div>
  </div>

  <div class="hud">
    <div class="hud-title">🕌 Saidpur Village</div>
    <div>🕹 Left stick: walk</div>
    <div>🕹 Right stick: turn</div>
    <div>✊ Right grip: toggle archive photo</div>
    <div>🔵 Approach markers: hear testimony</div>
    <div>⟵ <a href="map-table-scene.html" style="color:#c0392b; text-decoration:none;">Return to Map</a>
         &nbsp;|&nbsp;
         <a href="reflection-scene.html" style="color:#d4a843; text-decoration:none;">Reflection →</a>
    </div>
  </div>

  <div id="grip-hint">
    RIGHT GRIP: toggle archive photo<br>
    B BUTTON: open/close info panel<br>
    BOTH GRIPS 2s: return to map
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; highRefreshRate: true; foveationLevel: 3"
    shadow="type: pcfsoft; enabled: true"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true">

    <!-- ═══════════════ ASSETS ═══════════════ -->
    <a-assets timeout="30000">
      <!--
        REPLACE: Add your real GLB model here.
        The file must be named exactly as referenced (case-sensitive on GitHub Pages).
        Compress with: gltf-transform optimize Model.glb Model-opt.glb
      -->
      <a-asset-item id="village-model" src="../assets/models/Model.glb"></a-asset-item>

      <!--
        REPLACE: Add real 360° sky image (equirectangular JPEG).
        Recommended size: 4096×2048 for quality, 2048×1024 for performance.
      -->
      <img id="sky-tex"    src="../assets/images/placeholder-sky.jpg"     crossorigin="anonymous" />

      <!-- Building-specific archival photographs -->
      <!-- REPLACE with real historical photos (Wikimedia Commons CC-licensed) -->
      <img id="archive-ram-kund"  src="../assets/images/placeholder-archive-01.jpg" crossorigin="anonymous" />
      <img id="archive-haveli"    src="../assets/images/placeholder-archive-02.jpg" crossorigin="anonymous" />
    </a-assets>

    <!-- ── Lighting ── -->
    <a-light type="ambient"     color="#ffffff" intensity="0.55"></a-light>
    <a-light type="directional" color="#ffd7a8" intensity="1.4"
             position="-20 30 10" castShadow="true"
             light="castShadow: true; shadowMapWidth: 2048; shadowMapHeight: 2048">
    </a-light>
    <!-- Fill light from opposite side -->
    <a-light type="directional" color="#a0b8d0" intensity="0.3" position="20 10 -10"></a-light>

    <!-- ── Sky ── -->
    <!--
      PLACEHOLDER sky color — replace <a-sky> src with a real equirectangular image:
      <a-sky src="#sky-tex" rotation="0 -110 0"></a-sky>
    -->
    <a-sky color="#d4a870" material="shader: flat; fog: false"></a-sky>

    <!-- ═══════════════════════════════════════
         VILLAGE GLB MODEL
         REPLACE: src points to your real GLB.
         Adjust position Y to ground the model.
         If model is missing, placeholder geometry is shown instead.
    ═══════════════════════════════════════ -->
    <a-entity
      id="village-glb"
      gltf-model="#village-model"
      position="0 -1.7 0"
      scale="1 1 1"
      shadow="cast: true; receive: true"
      animation-mixer="clip: *; loop: repeat">
    </a-entity>

    <!--
      PLACEHOLDER GEOMETRY — visible when Model.glb is missing.
      Remove or hide this once your real model loads.
    -->
    <a-entity id="placeholder-village" position="0 0 0">
      <!-- Ground plane -->
      <a-plane rotation="-90 0 0" width="80" height="80"
               material="color: #8a7d60; roughness: 0.9">
      </a-plane>
      <!-- Cobbled path -->
      <a-plane rotation="-90 0 0" width="4" height="60" position="0 0.02 -10"
               material="color: #a09070; roughness: 0.8">
      </a-plane>
      <!-- Building A — placeholder for haveli -->
      <a-box position="-6 2 -15" width="8" height="4" depth="6"
             material="color: #c8aa80; roughness: 0.8" shadow="cast: true; receive: true">
      </a-box>
      <!-- Building B — placeholder for temple site -->
      <a-box position="8 1.5 -8" width="5" height="3" depth="5"
             material="color: #b09878; roughness: 0.8" shadow="cast: true; receive: true">
      </a-box>
      <!-- Placeholder minaret -->
      <a-cylinder position="10 4 -8" radius="0.4" height="8"
                  material="color: #d0b888; roughness: 0.7" shadow="cast: true">
      </a-cylinder>
    </a-entity>

    <!-- ═══════════════════════════════════════
         NARRATIVE HOTSPOTS
         Each hotspot triggers audio testimony and shows an info panel
         when the player walks near it.
         REPLACE audio src with real .mp3 files.
    ═══════════════════════════════════════ -->

    <!-- Hotspot: Ram Kund (Hindu pilgrimage tank) -->
    <a-entity id="hotspot-ram-kund"
              position="8 0 -8"
              proximity-trigger="audio: ../assets/audio/testimony-ram-kund.mp3;
                                  radius: 5;
                                  label: Ram Kund — 1947;
                                  description: A Hindu pilgrimage tank abandoned overnight. Placeholder: add real testimony.">
      <!-- Glowing ground marker -->
      <a-cylinder position="0 0.02 0" radius="0.8" height="0.04"
                  material="color: #00ffaa; emissive: #00aa66; emissiveIntensity: 0.8; transparent: true; opacity: 0.5"
                  animation="property: material.opacity; from: 0.5; to: 0.2; dir: alternate; dur: 1500; loop: true">
      </a-cylinder>
      <!-- Historical overlay component — grip to reveal archival image -->
      <a-plane position="0 2.5 0" width="3" height="2"
               historical-overlay="historicalSrc: #archive-ram-kund; label: Ram Kund — circa 1940"
               material="color: #1a1a2a; opacity: 0; transparent: true">
      </a-plane>
    </a-entity>

    <!-- Hotspot: The Haveli -->
    <a-entity id="hotspot-haveli"
              position="-6 0 -14"
              proximity-trigger="audio: ../assets/audio/testimony-haveli.mp3;
                                  radius: 6;
                                  label: The Haveli — 1947;
                                  description: Hindu merchant mansion. Owners fled to Amritsar. Now a heritage restaurant. Placeholder: add real testimony.">
      <a-cylinder position="0 0.02 0" radius="0.9" height="0.04"
                  material="color: #4488ff; emissive: #2244aa; emissiveIntensity: 0.8; transparent: true; opacity: 0.5"
                  animation="property: material.opacity; from: 0.5; to: 0.2; dir: alternate; dur: 1800; loop: true">
      </a-cylinder>
      <a-plane position="0 3 0" width="4" height="2.5"
               historical-overlay="historicalSrc: #archive-haveli; label: The Haveli — circa 1938"
               material="color: #1a1a2a; opacity: 0; transparent: true">
      </a-plane>
    </a-entity>

    <!-- Hotspot: Village Mosque (built on dharamsala site) -->
    <a-entity id="hotspot-mosque"
              position="4 0 -20"
              proximity-trigger="audio: ../assets/audio/testimony-mosque.mp3;
                                  radius: 5;
                                  label: The Mosque — built 1948;
                                  description: Constructed on the site of a Hindu dharamsala (rest house). Placeholder: add real testimony.">
      <a-cylinder position="0 0.02 0" radius="0.7" height="0.04"
                  material="color: #ffaa00; emissive: #cc7700; emissiveIntensity: 0.8; transparent: true; opacity: 0.5"
                  animation="property: material.opacity; from: 0.5; to: 0.2; dir: alternate; dur: 2000; loop: true">
      </a-cylinder>
    </a-entity>

    <!-- ═══════════════════════════════════════
         RETURN TO MAP TELEPORT PORTAL
    ═══════════════════════════════════════ -->
    <a-entity position="0 0 4">
      <a-cylinder class="clickable" id="return-portal"
                  radius="0.5" height="0.08"
                  material="color: #c0392b; emissive: #c0392b; emissiveIntensity: 1; transparent: true; opacity: 0.7"
                  animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
      </a-cylinder>
      <a-text value="← RETURN TO MAP" position="0 0.3 0" align="center"
              color="#c0392b" width="2.5" font="mozillavr">
      </a-text>
    </a-entity>

    <!-- ── Dust burst transition ── -->
    <a-entity id="dust-burst" visible="false">
      <a-sphere radius="0.5"
                material="color: #d2b48c; shader: flat; transparent: true; opacity: 0.9; side: back"
                animation__scale="property: scale; from: 1 1 1; to: 40 40 40; dur: 1500; startEvents: burst; easing: easeOutCubic"
                animation__fade="property: material.opacity; from: 0.9; to: 0; dur: 1500; startEvents: burst; easing: easeOutQuad">
      </a-sphere>
    </a-entity>

    <!-- ── Camera Rig ── -->
    <a-entity id="camera-rig" position="0 0 3" rotation="0 0 0"
              thumbstick-locomotion="speed: 2.5; deadzone: 0.2; vrOnly: true"
              snap-turn="angle: 45">

      <a-entity id="main-camera" camera look-controls wasd-controls position="0 1.6 0">
        <a-plane id="fade-plane" position="0 0 -0.1" width="2" height="2"
                 material="color: #000; shader: flat; transparent: true; opacity: 0; depthTest: false">
        </a-plane>
      </a-entity>

      <a-entity id="left-hand"
                laser-controls="hand: left"
                raycaster="objects: .clickable; far: 20; lineColor: #ffaa00; showLine: true">
      </a-entity>
      <a-entity id="right-hand"
                laser-controls="hand: right"
                raycaster="objects: .clickable; far: 20; lineColor: #ffaa00; showLine: true">
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const scene       = document.querySelector('a-scene');
    const villageGLB  = document.querySelector('#village-glb');
    const placeholder = document.querySelector('#placeholder-village');
    const cameraRig   = document.querySelector('#camera-rig');
    const fadePlane   = document.querySelector('#fade-plane');
    const dustBurst   = document.querySelector('#dust-burst');

    // ── Set village fog ──────────────────────────────────
    scene.addEventListener('loaded', () => {
      scene.setAttribute('fog', 'type: exponential; color: #c8b890; density: 0.004');
      setTimeout(() => {
        document.querySelector('#loading-screen').classList.add('hidden');
      }, 1400);
    });

    // ── GLB model events ────────────────────────────────
    villageGLB.addEventListener('model-loaded', (e) => {
      console.log('✅ Village GLB loaded');
      // Hide placeholder geometry once real model appears
      placeholder.setAttribute('visible', 'false');

      // Log model dimensions to console for positioning help
      const obj    = e.detail.model;
      const box    = new THREE.Box3().setFromObject(obj);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      console.log(`📐 Size: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`);
      console.log(`📍 Center: ${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)}`);
      console.log(`📏 Floor Y in world space: ${(box.min.y + (-1.7)).toFixed(2)} (should be ≤ 0)`);
    });

    villageGLB.addEventListener('model-error', (e) => {
      console.warn('⚠️ GLB not found — showing placeholder geometry. Add Model.glb to assets/models/');
    });

    // ── Return-to-map portal click ───────────────────────
    document.querySelector('#return-portal').addEventListener('click', () => {
      // Fade out, then navigate to map table
      fadePlane.setAttribute('animation__fadein',
        'property: material.opacity; from: 0; to: 1; dur: 800; easing: linear');
      setTimeout(() => {
        window.location.href = 'map-table-scene.html';
      }, 900);
    });
  </script>

</body>
</html>
