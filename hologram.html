<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holographic VR Experience</title>

  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    a-scene   { width: 100vw; height: 100vh; }

    /* ── Hidden video element ──────────────────────────────────── */
    #holo-video {
      display: none;   /* Invisible but still plays / provides texture */
      width: 1px; height: 1px;
    }

    /* ── Fade-in overlay ───────────────────────────────────────── */
    #fade-overlay {
      position: fixed; inset: 0;
      background: #000;
      pointer-events: none;
      z-index: 9999;
      opacity: 1;                       /* starts black, fades to clear on load */
      transition: opacity 1.8s ease;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>

  <script>
  /* ─────────────────────────────────────────────────────────────────
     GLSL SHADERS
  ───────────────────────────────────────────────────────────────── */
  const HOLO_VERT = /* glsl */`
    varying vec2  vUv;
    varying vec3  vNormal;
    varying vec3  vWorldPos;
    varying vec3  vViewDir;
    uniform float uTime;
    uniform float uWobble;

    void main () {
      vUv     = uv;
      vNormal = normalize(normalMatrix * normal);

      vec3 p  = position + normal
                * sin(uTime * 1.9 + position.y * 9.0 + position.x * 4.0)
                * uWobble;

      vec4 world = modelMatrix * vec4(p, 1.0);
      vWorldPos  = world.xyz;
      vViewDir   = normalize(cameraPosition - world.xyz);
      gl_Position = projectionMatrix * viewMatrix * world;
    }
  `;

  const HOLO_FRAG = /* glsl */`
    precision highp float;

    uniform sampler2D uTex;
    uniform float     uTime;
    uniform vec3      uColor;
    uniform float     uOpacity;
    uniform float     uScanDensity;
    uniform float     uScanAmt;
    uniform float     uScanSpeed;
    uniform float     uFlicker;
    uniform float     uFlickerHz;
    uniform float     uAberration;
    uniform float     uGlowEdge;
    uniform float     uVignette;
    uniform float     uRimPow;
    uniform int       uHasVideo;

    varying vec2  vUv;
    varying vec3  vNormal;
    varying vec3  vViewDir;

    float hash (float n) { return fract(sin(n) * 43758.5453); }

    float scanlines (float y) {
      float line = sin((y + uTime * uScanSpeed) * uScanDensity * 6.28318);
      return 1.0 - uScanAmt * (line * 0.5 + 0.5);
    }

    float edgeMask (vec2 uv) {
      float r = uGlowEdge;
      vec2  d = smoothstep(vec2(0.0), vec2(r), uv)
              * (1.0 - smoothstep(vec2(1.0 - r), vec2(1.0), uv));
      return d.x * d.y;
    }

    float vigAmt (vec2 uv) {
      vec2 c = uv - 0.5;
      return 1.0 - uVignette * dot(c, c) * 4.0;
    }

    vec3 holoGrid (vec2 uv) {
      float gx    = step(0.955, fract(uv.x * 16.0));
      float gy    = step(0.955, fract(uv.y * 10.0));
      float grid  = max(gx, gy);
      float sweep = smoothstep(0.0, 0.08,
                      fract(uv.x * 0.28 - uv.y * 0.18 + uTime * 0.14));
      return uColor * (0.08 + 0.72 * grid + 0.28 * sweep);
    }

    void main () {
      float ab = uAberration;
      vec4 cR  = texture2D(uTex, vUv + vec2( ab,  ab * 0.45));
      vec4 cG  = texture2D(uTex, vUv);
      vec4 cB  = texture2D(uTex, vUv + vec2(-ab, -ab * 0.45));
      vec3 vid = vec3(cR.r, cG.g, cB.b);

      vec3 base = (uHasVideo == 1) ? vid : holoGrid(vUv);

      vec3 holo = mix(base, uColor * base, 0.55);
      holo += uColor * 0.04;

      float rim = 1.0 - clamp(dot(normalize(vNormal), normalize(vViewDir)), 0.0, 1.0);
      holo += uColor * pow(rim, uRimPow) * 0.65;

      holo *= scanlines(vUv.y);
      holo *= 1.0 - uFlicker * hash(floor(uTime * uFlickerHz) + 0.51);

      float mask = edgeMask(vUv);
      holo += uColor * (1.0 - mask) * 0.40;
      holo *= vigAmt(vUv);

      float alpha = cG.a * mask * uOpacity;
      alpha = max(alpha, (1.0 - mask) * 0.14 * uOpacity);

      gl_FragColor = vec4(holo, alpha);
    }
  `;

  /* ─────────────────────────────────────────────────────────────
     Helpers
  ───────────────────────────────────────────────────────────── */
  function buildHoloMat (col, tex) {
    return new THREE.ShaderMaterial({
      uniforms: {
        uTex:         { value: tex || new THREE.Texture() },
        uTime:        { value: 0 },
        uColor:       { value: col },
        uOpacity:     { value: 0 },          /* start at 0 — fade-in handled below */
        uScanDensity: { value: 55 },
        uScanAmt:     { value: 0.28 },
        uScanSpeed:   { value: 0.20 },
        uFlicker:     { value: 0.07 },
        uFlickerHz:   { value: 3.5 },
        uAberration:  { value: 0.007 },
        uGlowEdge:    { value: 0.065 },
        uVignette:    { value: 0.55 },       /* slightly stronger vignette for dome */
        uRimPow:      { value: 1.9 },
        uWobble:      { value: 0.0016 },
        uHasVideo:    { value: tex ? 1 : 0 },
      },
      vertexShader:   HOLO_VERT,
      fragmentShader: HOLO_FRAG,
      transparent:    true,
      side:           THREE.BackSide,        /* render inner face of the dome */
      depthWrite:     false,
      blending:       THREE.AdditiveBlending,
    });
  }

  function buildRing (rx, ry, segs, col, opacity) {
    const pts = [];
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(a) * rx, Math.sin(a) * ry, 0));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
      color: col, transparent: true, opacity,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    return new THREE.Line(geo, mat);
  }

  /* ─────────────────────────────────────────────────────────────
     COMPONENT: hologram-video  (MODIFIED: curved semi-dome screen)
  ───────────────────────────────────────────────────────────── */
  AFRAME.registerComponent('hologram-video', {
    schema: {
      videoSrc: { type: 'string',  default: '' },
      audioSrc: { type: 'string',  default: '' },
      color:    { type: 'color',   default: '#50ffcc' },
      width:    { type: 'number',  default: 1.8 },
      height:   { type: 'number',  default: 1.0 },
      volume:   { type: 'number',  default: 0.9 },
      autoplay: { type: 'boolean', default: true  },
      /* ── Dome parameters ── */
      domeRadius:     { type: 'number', default: 3.2 },  /* TUNE:RADIUS */
      domeArc:        { type: 'number', default: 2.09 }, /* TUNE:ARC (radians, ~120°) */
      domeSegmentsR:  { type: 'number', default: 64 },
      domeSegmentsH:  { type: 'number', default: 20 },
      fadeInMs:       { type: 'number', default: 1800 }, /* TUNE:FADE_IN */
    },

    init () {
      this._t      = 0;
      this._rings  = [];
      this._parts  = [];
      this._bloom  = null;
      this._targetOpacity = 0.94;
      this._fadeDone = false;

      const d   = this.data;
      const col = new THREE.Color(d.color);
      const hi  = col.clone().multiplyScalar(1.7);

      /* ── Video texture ── */
      let tex = null;
      this._vidEl = null;
      if (d.videoSrc) {
        const v = document.querySelector(d.videoSrc);
        if (v && v.tagName === 'VIDEO') {
          tex = new THREE.VideoTexture(v);
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format    = THREE.RGBAFormat;
          this._vidEl   = v;
          this._vidTex  = tex;

          /* ── Autoplay with muted fallback (browser policy) ── */
          if (d.autoplay) {
            v.loop   = true;
            v.muted  = false;
            v.volume = d.volume;
            const playAttempt = v.play();
            if (playAttempt !== undefined) {
              playAttempt.catch(() => {
                v.muted = true;
                v.play().catch(() => {});
              });
            }

            /* ── BONUS: glow intensity boost when video plays ── */
            v.addEventListener('playing', () => {
              if (this._mat) {
                this._mat.uniforms.uGlowEdge.value  = 0.10;
                this._mat.uniforms.uAberration.value = 0.012;
              }
            }, { once: true });
          }
        }
      }

      /* ── Gesture-unlock for audio (required on many browsers) ── */
      const unlockAudio = () => {
        if (this._vidEl && this._vidEl.paused) {
          this._vidEl.muted = false;
          this._vidEl.play().catch(() => {});
        }
        document.removeEventListener('click',      unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
        document.removeEventListener('keydown',    unlockAudio);
      };
      document.addEventListener('click',      unlockAudio, { once: true });
      document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
      document.addEventListener('keydown',    unlockAudio, { once: true });

      /* ═══════════════════════════════════════════════════════════
         CURVED SEMI-DOME SCREEN
      ═════════════════════════════════════════════════════════════ */
      this._mat = buildHoloMat(col, tex);

      const arcStart = Math.PI - d.domeArc / 2;
      const domeGeo  = new THREE.CylinderGeometry(
        d.domeRadius,          /* radiusTop    */
        d.domeRadius,          /* radiusBottom */
        d.height,              /* height       */
        d.domeSegmentsR,       /* radialSegs   */
        d.domeSegmentsH,       /* heightSegs   */
        true,                  /* openEnded    */
        arcStart,              /* thetaStart   */
        d.domeArc              /* thetaLength  */
      );

      /* ── Fix UV mapping so video fills the curved surface correctly ── */
      const uvAttr  = domeGeo.attributes.uv;
      const posAttr = domeGeo.attributes.position;
      for (let i = 0; i < uvAttr.count; i++) {
        const x   = posAttr.getX(i);
        const z   = posAttr.getZ(i);
        let angle = Math.atan2(x, -z);                      /* -π … π  */
        /* normalise angle relative to arc start/end → 0…1 */
        let u = (angle - arcStart) / d.domeArc;
        u = THREE.MathUtils.clamp(u, 0, 1);
        uvAttr.setX(i, u);
      }
      uvAttr.needsUpdate = true;

      this._screen = new THREE.Mesh(domeGeo, this._mat);
      /* Rotate so open face points toward +Z (toward camera at origin) */
      this._screen.rotation.y = 0;
      this.el.object3D.add(this._screen);

      /* ── Corner brackets (scaled to dome curvature) ── */
      const bw = d.width * 0.08, bh = d.height * 0.12;
      const hw = d.domeRadius * Math.sin(d.domeArc / 2) * 0.92;
      const hh = d.height / 2 + 0.03;
      /* brackets at the arc ends, projected onto the cylinder surface */
      [-1, 1].forEach(side => {
        const aEnd    = arcStart + (side === 1 ? d.domeArc : 0);
        const cx      = d.domeRadius * Math.sin(aEnd);
        const cz      = -d.domeRadius * Math.cos(aEnd);
        const sy      = side;
        [[hh], [-hh]].forEach(([cy]) => {
          const pts = [
            new THREE.Vector3(cx + side * bw, cy, cz),
            new THREE.Vector3(cx, cy, cz),
            new THREE.Vector3(cx, cy + (cy > 0 ? 1 : -1) * bh, cz),
          ];
          const g = new THREE.BufferGeometry().setFromPoints(pts);
          const m = new THREE.LineBasicMaterial({
            color: hi, transparent: true, opacity: 0.7,
            blending: THREE.AdditiveBlending, depthWrite: false,
          });
          this.el.object3D.add(new THREE.Line(g, m));
        });
      });

      /* ── Orbital rings ── */
      const ringDefs = [
        { rx: d.domeRadius * 1.05, ry: d.height * 0.60, tiltX: 0,   tiltZ: 0,   speed:  0.28,  op: 0.35 },
        { rx: d.domeRadius * 1.20, ry: d.height * 0.30, tiltX: 28,  tiltZ: 0,   speed: -0.18,  op: 0.22 },
        { rx: d.domeRadius * 1.35, ry: d.height * 0.18, tiltX: 58,  tiltZ: 15,  speed:  0.12,  op: 0.14 },
      ];
      ringDefs.forEach(def => {
        const r = buildRing(def.rx, def.ry, 96, hi, def.op);
        r.rotation.x = THREE.MathUtils.degToRad(def.tiltX);
        r.rotation.z = THREE.MathUtils.degToRad(def.tiltZ);
        this.el.object3D.add(r);
        this._rings.push({ mesh: r, speed: def.speed });
      });

      /* ── Projection beam ── */
      const bGeo = new THREE.CylinderGeometry(0.012, d.domeRadius * 0.52, d.height * 0.90, 16, 1, true);
      const bMat = new THREE.MeshBasicMaterial({
        color: col, transparent: true, opacity: 0.06,
        side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
      });
      this._beam = new THREE.Mesh(bGeo, bMat);
      this._beam.position.y = -(d.height / 2 + d.height * 0.45);
      this.el.object3D.add(this._beam);

      /* emitter disc */
      const discGeo = new THREE.RingGeometry(0.01, d.domeRadius * 0.08, 32);
      const discMat = new THREE.MeshBasicMaterial({
        color: hi, transparent: true, opacity: 0.50,
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
      });
      const disc = new THREE.Mesh(discGeo, discMat);
      disc.rotation.x = -Math.PI / 2;
      disc.position.y = -(d.height / 2 + 0.012);
      this.el.object3D.add(disc);
      this._disc = disc;

      /* ── Floating particles ── */
      const pCount = 60;
      const pGeo   = new THREE.PlaneGeometry(0.022, 0.022);
      for (let i = 0; i < pCount; i++) {
        const pMat = new THREE.MeshBasicMaterial({
          color: hi, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        });
        const p     = new THREE.Mesh(pGeo, pMat);
        const angle = arcStart + (i / pCount) * d.domeArc;
        const rad   = d.domeRadius * (0.85 + Math.random() * 0.30);
        p.position.set(
          Math.sin(angle) * rad,
          (Math.random() - 0.5) * d.height * 1.2,
          -Math.cos(angle) * rad
        );
        p._ang = angle; p._rad = rad;
        p._bY  = p.position.y;
        p._ph  = Math.random() * Math.PI * 2;
        p._os  = (Math.random() > 0.5 ? 1 : -1) * (0.06 + Math.random() * 0.16);
        p._bs  = 0.35 + Math.random() * 0.75;
        this.el.object3D.add(p);
        this._parts.push(p);
      }

      /* ── Audio ── */
      this._audio = null;
      if (d.audioSrc) {
        const a = document.querySelector(d.audioSrc);
        if (a) {
          this._audio = a;
          a.loop   = true;
          a.volume = d.volume;
          if (d.autoplay) a.play().catch(() => {});
        }
      }

      /* ── CSS bloom ── */
      const bloom = document.createElement('div');
      Object.assign(bloom.style, {
        position:      'fixed',
        pointerEvents: 'none',
        zIndex:        '449',
        borderRadius:  '50%',
        background:    `radial-gradient(ellipse at center,
                          ${d.color}28 0%, ${d.color}12 40%, transparent 70%)`,
        transform:     'translate(-50%,-50%)',
        width: '0px', height: '0px',
        opacity: '0',
        transition: 'opacity 0.5s ease',
      });
      document.body.appendChild(bloom);
      this._bloom = bloom;

      /* scratch vectors */
      this._wPos = new THREE.Vector3();
      this._ndc  = new THREE.Vector3();

      /* ── BONUS: Fade-in transition ── */
      this._fadeStart = performance.now();
      this._fadeInMs  = d.fadeInMs;
      this._fadeDone  = false;

      /* Also fade the CSS overlay */
      requestAnimationFrame(() => {
        const overlay = document.getElementById('fade-overlay');
        if (overlay) {
          overlay.style.opacity = '0';
          setTimeout(() => {
            if (overlay) overlay.style.display = 'none';
          }, 2000);
        }
      });
    },

    tick (time, dt) {
      const dts  = dt / 1000;
      this._t   += dts;
      const T    = this._t;

      if (this._mat) this._mat.uniforms.uTime.value = T;
      if (this._vidTex) this._vidTex.needsUpdate = true;

      /* ── Fade-in opacity animation ── */
      if (!this._fadeDone && this._mat) {
        const elapsed  = performance.now() - this._fadeStart;
        const progress = Math.min(elapsed / this._fadeInMs, 1.0);
        const eased    = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;  /* ease-in-out quad */
        this._mat.uniforms.uOpacity.value = eased * 0.94;
        if (progress >= 1.0) this._fadeDone = true;
      }

      /* rings */
      this._rings.forEach(r => { r.mesh.rotation.y += r.speed * dts; });

      /* beam breathe */
      if (this._beam) this._beam.material.opacity = 0.04 + 0.04 * Math.sin(T * 1.1);
      if (this._disc) this._disc.material.opacity  = 0.35 + 0.25 * Math.sin(T * 3.1);

      /* screen gentle float */
      if (this._screen) this._screen.position.y = Math.sin(T * 0.55) * 0.018;

      /* particles */
      const arcStart = Math.PI - this.data.domeArc / 2;
      this._parts.forEach(p => {
        p._ang        += p._os * dts;
        const rad      = p._rad;
        p.position.x   = Math.sin(p._ang) * rad;
        p.position.z   = -Math.cos(p._ang) * rad;
        p.position.y   = p._bY + Math.sin(T * p._bs + p._ph) * 0.06;
        p.material.opacity = (0.15 + 0.55 * (0.5 + 0.5 * Math.sin(T * 2.6 + p._ph))) * 0.70;
      });

      this._projectBloom();
    },

    _projectBloom () {
      const scene = this.el.sceneEl;
      if (!scene || !scene.renderer || !scene.camera) return;
      this.el.object3D.getWorldPosition(this._wPos);
      this._ndc.copy(this._wPos).project(scene.camera);
      if (this._ndc.z > 1) { this._bloom.style.opacity = '0'; return; }
      const cvs = scene.renderer.domElement;
      const sx  = ( this._ndc.x + 1) * 0.5 * cvs.clientWidth;
      const sy  = (-this._ndc.y + 1) * 0.5 * cvs.clientHeight;
      const d   = this.data;
      const dist  = scene.camera.position.distanceTo(this._wPos);
      const fovRad = THREE.MathUtils.degToRad(scene.camera.fov || 80);
      const projH = (d.height / dist) * cvs.clientHeight / (2 * Math.tan(fovRad * 0.5));
      const projW = projH * (d.domeRadius * 2 / d.height);
      Object.assign(this._bloom.style, {
        left: `${sx}px`, top: `${sy}px`,
        width:  `${projW * 2.8}px`,
        height: `${projH * 2.8}px`,
        opacity: String(Math.min(1, this._mat ? this._mat.uniforms.uOpacity.value : 0)),
      });
    },

    pauseHolo () {
      if (this._vidEl) this._vidEl.pause();
      if (this._audio) this._audio.pause();
      if (this._bloom) this._bloom.style.opacity = '0';
    },

    resumeHolo () {
      if (this._vidEl) this._vidEl.play().catch(() => {});
      if (this._audio) this._audio.play().catch(() => {});
    },

    remove () {
      this.pauseHolo();
      if (this._mat)    this._mat.dispose();
      if (this._vidTex) this._vidTex.dispose();
      if (this._bloom && this._bloom.parentNode)
        this._bloom.parentNode.removeChild(this._bloom);
      this._parts.forEach(p => { p.geometry.dispose(); p.material.dispose(); });
      this._rings.forEach(r => { r.mesh.geometry.dispose(); r.mesh.material.dispose(); });
    },
  });

  console.log('[hologram-dome] hologram-video (curved dome) registered');
  </script>
</head>
<body>

<video
  id="holo-video"
  src="assets/video/testimony-hologram.mp4"
  loop
  playsinline
  crossorigin="anonymous"
  preload="auto">
</video>

<div id="fade-overlay"></div>

<a-scene
  id="main-scene"
  background="color: #000000"
  fog="type: exponential; color: #000000; density: 0.18"
  webxr="optionalFeatures: local-floor, bounded-floor"
  renderer="antialias: true; colorManagement: true; sortObjects: true"
  vr-mode-ui="enabled: true">

  <a-assets>
    <video
      id="holo-video-asset"
      src=""
      loop
      playsinline
      crossorigin="anonymous"
      preload="auto">
    </video>

    <audio id="holo-audio" src="assets/audio/scene1.mp3" preload="auto" loop></audio>
  </a-assets>

  <a-entity id="rig" position="0 0 0">
    <a-entity
      id="camera"
      camera="fov: 80; near: 0.01"
      look-controls="pointerLockEnabled: false"
      position="0 0 0">
    </a-entity>
  </a-entity>

  <a-entity
    id="holo-display"
    position="0 0 -3.1"
    hologram-video="
      videoSrc: #holo-video;
      audioSrc: #holo-audio;
      color: #50ffcc;
      
      height: 2.4; domeRadius: 4.0;      domeArc: -7;         width: -3;
      volume: 0.9;
      autoplay: true;">
  </a-entity>

  <a-light type="ambient" color="#000000" intensity="0.0"></a-light>

</a-scene>

<button type="button" id="holo-enter-museum"
  style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10000;padding:12px 28px;font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;background:rgba(0,20,24,.9);color:#50ffcc;border:1px solid #50ffcc;border-radius:2px;box-shadow:0 0 18px rgba(80,255,204,.2);">
  Enter museum
</button>
<script>
(function () {
  const btn = document.getElementById('holo-enter-museum');
  if (!btn) return;
  btn.addEventListener('click', () => {

    // 1. Disable the button so it can't be clicked twice
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.pointerEvents = 'none';

    // 2. Pause hologram audio/video
    const aud = document.querySelector('#holo-audio');
    const vid = document.querySelector('#holo-video');
    if (aud) { aud.pause(); try { aud.currentTime = 0; } catch (e) {} }
    if (vid) { vid.pause(); try { vid.currentTime = 0; } catch (e) {} }
    const holo = document.querySelector('#holo-display');
    const comp = holo && holo.components && holo.components['hologram-video'];
    if (comp && typeof comp.pauseHolo === 'function') comp.pauseHolo();

    // 3. Fade to black, then navigate to the museum
    const overlay = document.getElementById('fade-overlay');
    if (overlay) {
      overlay.style.display = 'block';
      overlay.style.transition = 'opacity 1.2s ease';
      overlay.style.opacity = '0';
      // Force reflow so transition fires
      overlay.getBoundingClientRect();
      overlay.style.opacity = '1';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1300);
    } else {
      window.location.href = 'index.html';
    }
  });
})();
</script>

</body>
</html>
